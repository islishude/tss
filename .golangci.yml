version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  relative-path-mode: gomod
  build-tags:
    - vectorgen
    - integration
    - slowcrypto
    - stress
    - tier1

linters:
  default: standard
  enable:
    - govet
    - errorlint
    - gosec
    - misspell
    - nilerr
    - nilnil
    - nilnesserr
    - nolintlint
    - unparam
    - unconvert
    - wastedassign
    - whitespace
  settings:
    govet:
      enable:
        - nilness
        - unusedwrite
    gosec:
      excludes:
        - G115
  exclusions:
    rules:
      # Keep unparam focused on production code; constant-only test-helper
      # arguments are common and do not affect the shipped API or protocol.
      - path: _test\.go
        linters:
          - unparam

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
