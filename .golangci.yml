version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  relative-path-mode: gomod
  build-tags:
    - vectorgen
    - integration
    - slowcrypto
    - stress
    - tier0
    - tier1

linters:
  default: standard
  enable:
    - govet
    - errorlint
    - gosec
    - misspell
    - nilerr
    - nilnil
    - nilnesserr
    - nolintlint
    - unconvert
    - wastedassign
    - whitespace
  settings:
    govet:
      enable:
        - nilness
        - unusedwrite
    gosec:
      excludes:
        - G115

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
