name: CI

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Fast checks that gate before running the heavier test matrix.
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build
        run: make build

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Run vet
        run: make vet

      - name: Verify module integrity
        run: make verify

      - name: Check go mod tidy
        run: make tidy-check

      - name: Check Markdown formatting
        run: make format-check

      - name: Run go fix diff
        run: go fix -diff ./...

  # Tier 0 + Tier 1: Fast unit tests + small-param crypto correctness.
  # Must complete in < 2m. Runs on both x86_64 and ARM64.
  test-fast:
    name: Test Fast (${{ matrix.os }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run Tier 0 + Tier 1 tests
        run: make test-fast

  # Tier 2: Integration tests with full keygen/presign/sign flows.
  # Uses reduced (768-bit) Paillier for speed. Runs on x86_64.
  test-integration:
    name: Test Integration
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run Tier 2 integration tests
        run: make test-integration

      - name: Run race detector on integration code
        run: go test -race -timeout 15m -tags=integration ./cggmp21/secp256k1/ ./internal/mta/ ./internal/zk/paillier/

  # Tier 3: Production security-parameter tests.
  # Runs on main pushes and scheduled nightly runs only.
  test-slow:
    name: Test Slow / Stress
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: test-integration
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run Tier 3 slowcrypto tests
        run: make test-slowcrypto

  # Tier 4: Production security-parameter stress.
  test-stress:
    name: Test Stress
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: test-integration
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run Tier 4 stress tests
        run: make test-stress
