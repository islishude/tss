name: Schedule Test
run-name: "Schedule Test(${{ github.event_name }} - ${{ github.ref_name }} - ${{ github.run_number }})"

on:
  schedule:
    - cron: "00 12 * * *"
  workflow_dispatch:

permissions:
  contents: read

# Production security-parameter tests and stress tests.
# Runs scheduled nightly runs only.
jobs:
  test-race:
    name: Test Race (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - run: make test-race

  test-stress-integration-cggmp21:
    name: Test Stress Integration(cggmp21 ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run Tier 4 stress tests
        run: make test-stress PKGS=./cggmp21/...

  test-stress-integration-frost:
    name: Test Stress Integration(frost ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run Tier 4 stress tests
        run: make test-stress PKGS=./frost/...

  test-stress-integration-internal:
    name: Test Stress Integration(internal ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run Tier 4 stress tests
        run: make test-stress PKGS=./internal/...

  test-slowcrypto-internal:
    name: Test SlowCrypto ZK(${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run Tier 4 stress tests
        run: make test-slowcrypto PKGS=./internal/...

  test-slowcrypto-cggmp21:
    name: Test SlowCrypto cggmp21(${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run Tier 4 stress tests
        run: make test-slowcrypto PKGS=./cggmp21/...

  test-slowcrypto-frost:
    name: Test SlowCrypto frost(${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run Tier 4 stress tests
        run: make test-slowcrypto PKGS=./frost/...

  test-fuzzing:
    name: Test Fuzzing (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run all fuzz targets
        shell: bash
        run: make fuzz-nightly

      - name: Upload failing corpus if generated
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-failures-${{ github.run_id }}-${{ runner.os }}-${{ runner.arch }}
          path: |
            **/testdata/fuzz/**
