name: Schedule Test

on:
  schedule:
    - cron: "00 12 * * *"
  workflow_dispatch:

permissions:
  contents: read

# Tier 3 + Tier 4: Production security-parameter tests and stress tests.
# Runs scheduled nightly runs only.
jobs:
  test-race:
    name: Test Race (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run Tier 3 slowcrypto tests
        run: go test -v -race -tags 'integration slowcrypto' -timeout 5h ./...

  test-stress-integration:
    name: Test Stress Integration(${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run Tier 4 stress tests
        run: go test -tags 'integration' -count=10 -timeout 5h ./...

  test-slowcrypto:
    name: Test SlowCrypto (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run Tier 4 stress tests
        run: go test -v -tags 'slowcrypto'  -run '^TestSlowCrypto' -timeout 1h ./...

  fuzzing-test:
    name: Test Fuzzing (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run all fuzz targets
        shell: bash
        run: ./.github/scripts/fuzz-ci.sh
        env:
          FUZZTIME: 10m
          PARALLEL: 4

      - name: Upload failing corpus if generated
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-failures-${{ github.run_id }}-${{ runner.os }}-${{ runner.arch }}
          path: |
            **/testdata/fuzz/**
